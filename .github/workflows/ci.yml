name: CI

on:
  push:
    branches-ignore:
      - 'noci/**'
  pull_request:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build, test and pack
        env:
          BUILD_SOURCEBRANCH: ${{ github.ref }}
        run: bash ./build.sh

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: NuGets
          path: PublishOutput/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: '**/TestResults/*.trx'

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CoverageReport
          path: CoverageReport/
