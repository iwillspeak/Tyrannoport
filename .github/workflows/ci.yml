name: CI/CD

on:
  push:
    branches-ignore:
      - 'noci/**'
    tags:
      - '*'
  pull_request:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build, test and pack
        env:
          BUILD_SOURCEBRANCH: ${{ github.ref }}
        run: bash ./build.sh

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: NuGets
          path: PublishOutput/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: '**/TestResults/*.trx'

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CoverageReport
          path: CoverageReport/

  deploy-prerelease:
    name: Push NuGet Packages to Repo Feed
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment: gh-nuget
    permissions:
      packages: write
    steps:
      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: NuGets

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push "**/*.nupkg" \
            --api-key "${{ secrets.GITHUB_TOKEN }}" \
            --source https://nuget.pkg.github.com/iwillspeak/index.json \
            --skip-duplicate

  deploy-live:
    name: Push NuGet Packages to NuGet.org
    needs: build
    if: >-
      github.event_name != 'pull_request' &&
      (startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    environment: live-nuget
    permissions:
      id-token: write
    steps:
      - name: Download NuGet packages
        uses: actions/download-artifact@v4
        with:
          name: NuGets

      - name: Get NuGet API token via OIDC
        id: get-nuget-token
        run: |
          OIDC_TOKEN=$(curl -sLS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=nuget:AcquireServiceAccountToken" \
            | jq -r '.value')
          if [ -z "$OIDC_TOKEN" ] || [ "$OIDC_TOKEN" = "null" ]; then
            echo "Failed to obtain OIDC token" >&2
            exit 1
          fi
          NUGET_TOKEN=$(curl -sLS -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${OIDC_TOKEN}" \
            "https://www.nuget.org/api/v3/identity/servicetokens" \
            | jq -r '.token')
          if [ -z "$NUGET_TOKEN" ] || [ "$NUGET_TOKEN" = "null" ]; then
            echo "Failed to obtain NuGet service token" >&2
            exit 1
          fi
          echo "::add-mask::${NUGET_TOKEN}"
          echo "token=${NUGET_TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Push to NuGet.org
        run: |
          dotnet nuget push "**/*.nupkg" \
            --api-key "$NUGET_TOKEN" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
        env:
          NUGET_TOKEN: ${{ steps.get-nuget-token.outputs.token }}
